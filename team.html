<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理团队 · LINK-X Ventures</title>
  <meta name="description" content="LINK-X Ventures 管理团队 — 研究与投资的长期伙伴。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    :root {
      --bg: #FAF8F4;
      --bg-warm: #F2EBE0;
      --bg-deep: #E8DFD2;
      --border: #DDD5CA;
      --border-light: #EAE4DC;
      --text: #1C1917;
      --text-soft: #44403C;
      --text-muted: #78716C;
      --text-light: #A8A29E;
      --accent: #9B7B5E;
      --accent-hover: #7D6148;
      --accent-light: #EBE1D5;
      --purple: #660874;
      --purple-mid: #8B3A9A;
      --purple-soft: #B07CC0;
      --purple-pale: #E8D5EE;
      --purple-wash: #F3EAF6;

      --font-serif: "Instrument Serif", "Noto Serif SC", Georgia, serif;
      --font-sans: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, monospace;

      --max: 1180px;
      --px: clamp(24px, 6vw, 80px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--px);
    }

    /* ---------- Progress bar ---------- */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--purple);
      z-index: 999;
      transition: width 0.1s linear;
    }

    /* ---------- Header ---------- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 248, 244, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      padding-bottom: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-family: var(--font-serif);
      font-size: 20px;
      letter-spacing: -0.02em;
    }
    .brand-mark { flex-shrink: 0; }
    .nav-links {
      display: flex;
      gap: 32px;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .nav-links a:hover { color: var(--text); }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--text-light);
    }
    .lang-toggle button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      color: var(--text-light);
      transition: color 0.2s ease;
    }
    .lang-toggle button:hover,
    .lang-toggle button.active { color: var(--purple); }
    .lang-toggle .sep { color: var(--border); }

    /* ---------- Section head ---------- */
    .kicker {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 14px;
    }
    .section-alt {
      background: var(--bg-warm);
    }

    /* ---------- Team page hero ---------- */
    .team-hero {
      padding: clamp(100px, 14vw, 200px) 0 clamp(60px, 8vw, 100px);
    }
    .team-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.15;
      max-width: 14ch;
    }
    .team-hero h1 em {
      font-style: italic;
      color: var(--purple);
    }
    .team-hero .sub {
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 17px;
      line-height: 1.7;
      max-width: 52ch;
    }

    /* ---------- Team grid ---------- */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
    }
    .team-member {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--bg);
    }
    .member-photo {
      aspect-ratio: 3 / 4;
      overflow: hidden;
    }
    .member-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      filter: grayscale(20%);
      transition: filter 0.4s ease, transform 0.5s ease;
    }
    .team-member:hover .member-photo img {
      filter: grayscale(0%);
      transform: scale(1.05);
    }
    .member-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 60px 24px 24px;
      background: linear-gradient(to top, rgba(28,25,23,0.7) 0%, rgba(28,25,23,0) 100%);
      color: #fff;
    }
    .team-member h3 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #fff;
      line-height: 1.3;
    }
    .member-title {
      display: block;
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    /* ---------- Footer ---------- */
    footer {
      background: var(--text);
      color: rgba(250, 248, 244, 0.6);
      padding: 60px 0 40px;
      font-size: 14px;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-brand .brand {
      color: var(--bg);
      margin-bottom: 4px;
      font-size: 18px;
    }
    .footer-brand .brand-mark { flex-shrink: 0; }
    .footer-brand p {
      color: rgba(250, 248, 244, 0.4);
      font-size: 13px;
      max-width: 34ch;
      line-height: 1.6;
    }
    .footer-copy {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(250, 248, 244, 0.2);
    }

    /* ---------- Reveal ---------- */
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.in { opacity: 1; transform: none; }

    /* ---------- i18n ---------- */
    [data-lang="zh"] .en-only { display: none; }
    [data-lang="en"] .zh-only { display: none; }

    /* ---------- Responsive ---------- */
    @media (max-width: 1024px) {
      .team-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .nav-links { display: none; }
      .team-grid { grid-template-columns: 1fr; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- ============ HEADER ============ -->

    <a href="index.html" class="brand" aria-label="LINK-X Ventures">
      <svg class="brand-mark" width="34" height="34" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

        <use href="#s" transform="translate(8,8)"/>
        <use href="#s" transform="translate(24,8)"/>
        <use href="#s" transform="translate(8,24)"/>
        <use href="#s" transform="translate(8,40)"/>

      <div class="footer-brand">
        <div class="brand">
          <svg class="brand-mark" width="28" height="28" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

            <use href="#sf" transform="translate(24,8)"/>

<script>
  const i18n = {
    zh: {
      "nav.beliefs": "理念", "nav.daily": "日报", "nav.focus": "关注领域", "nav.portfolio": "投资组合", "nav.team": "团队", "nav.contact": "联系",
      "team.hero": "研究与投资的<em>长期伙伴</em>。",
      "team.sub": "我们在清华与斯坦福之间来回奔走，以每日研究驱动投资判断，陪伴定义下一代智能范式的团队。",
      "team.n1": "张鸣晨", "team.t1": "主管合伙人 / Managing Partner",
      "team.n2": "王璞", "team.t2": "合伙人 / Partner",
      "team.n3": "王晨", "team.t3": "合伙人 / Partner",
      "team.n4": "李文珏", "team.t4": "合伙人 / Partner",
      "footer.desc": "Investing in the AI capability frontier. 投资 AI 能力跃迁。"
    },
    en: {
      "nav.beliefs": "Beliefs", "nav.daily": "Daily", "nav.focus": "Focus", "nav.portfolio": "Portfolio", "nav.team": "Team", "nav.contact": "Contact",
      "team.hero": "Long-term partners in <em>research and investment</em>.",
      "team.sub": "We shuttle between Tsinghua and Stanford, driving investment conviction through daily research — partnering with teams that define the next paradigm of intelligence.",
      "team.n1": "Mingchen Zhang", "team.t1": "Managing Partner",
      "team.n2": "Pu Wang", "team.t2": "Partner",
      "team.n3": "Chen Wang", "team.t3": "Partner",
      "team.n4": "Wenjue Li", "team.t4": "Partner",
      "footer.desc": "Investing in the AI capability frontier."
    }
  };

  function applyLang(lang) {
    const dict = i18n[lang];
    document.documentElement.setAttribute("data-lang", lang);
    document.documentElement.setAttribute("lang", lang === "zh" ? "zh-CN" : "en");
    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      if (!dict[key]) return;
      const val = dict[key];
      if (val.indexOf("<em>") !== -1) el.innerHTML = val;
      else el.textContent = val;
    });
    document.querySelectorAll("[data-set-lang]").forEach(btn => {
      btn.classList.toggle("active", btn.getAttribute("data-set-lang") === lang);
    });
    try { localStorage.setItem("linkx.lang", lang); } catch(e){}
  }

  document.querySelectorAll("[data-set-lang]").forEach(btn => {
    btn.addEventListener("click", () => applyLang(btn.getAttribute("data-set-lang")));
  });

  (function initLang() {
    let lang = "zh";
    try {
      const saved = localStorage.getItem("linkx.lang");
      if (saved === "en" || saved === "zh") lang = saved;
      else if ((navigator.language || "").toLowerCase().startsWith("en")) lang = "en";
    } catch(e) {}
    applyLang(lang);
  })();

  // Progress bar
  const bar = document.getElementById("progressBar");
  window.addEventListener("scroll", () => {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + "%";
  }, { passive: true });

  // Reveal on scroll
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add("in"); io.unobserve(entry.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll(".reveal").forEach(el => io.observe(el));
</script>

</body>
