<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AGI 2026 strategy cover</title>
  <desc id="desc">A layered frontier map showing pre-AGI technology paths and investment signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF8F4"/>
      <stop offset="0.5" stop-color="#F0E7DC"/>
      <stop offset="1" stop-color="#D8CABE"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="58%" r="60%">
      <stop offset="0" stop-color="#660874" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#B07CC0" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#660874" stop-opacity="0"/>
