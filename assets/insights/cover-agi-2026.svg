    <path d="M240 746C390 644 536 604 692 640C870 682 1030 612 1196 432C1302 318 1392 260 1508 232" stroke="#660874" stroke-opacity="0.52" stroke-width="2.2"/>
    <path d="M252 640C430 548 552 410 728 436C910 464 1036 448 1208 300C1308 214 1400 178 1506 164" stroke="#8B3A9A" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>
  <rect x="48" y="48" width="1504" height="904" fill="none" stroke="#1C1917" stroke-opacity="0.16"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.88"/>
