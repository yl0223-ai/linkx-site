<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AI entertainment systems cover</title>
  <desc id="desc">Abstract stages, screens and generative media paths in LINK-X editorial colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F0E7"/>
      <stop offset="0.62" stop-color="#E9DED1"/>
      <stop offset="1" stop-color="#D7C5B5"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="36%" r="68%">
