<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Reasoning entanglement cover</title>
  <desc id="desc">Two wireframe reasoning structures connected by a violet intelligence field.</desc>
  <defs>
