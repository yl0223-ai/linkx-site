<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">AI entertainment layered-slice cover</title>
  <desc id="desc">Layered translucent planes and purple signal beams inspired by technical drawing and abstract media systems.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCF8EE"/>
      <stop offset="0.55" stop-color="#EEE3D5"/>
      <stop offset="1" stop-color="#D8C8BA"/>
    </linearGradient>
    <radialGradient id="glow" cx="67%" cy="48%" r="54%">
      <stop offset="0" stop-color="#660874" stop-opacity="0.36"/>
      <stop offset="0.52" stop-color="#B07CC0" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#660874" stop-opacity="0"/>
    </radialGradient>
    <pattern id="fineGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1C1917" stroke-opacity="0.045"/>
    </pattern>
    <filter id="violetBlur"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="grain">
